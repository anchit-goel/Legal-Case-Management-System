<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal Case Management</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --ink: #1d2635;
      --muted: #5b6778;
      --card: #ffffff;
      --line: #d8e0ee;
      --brand: #0a5bd7;
      --danger: #ad1e1e;
      --ok: #0f7a38;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Segoe UI, Tahoma, sans-serif; color: var(--ink); background: linear-gradient(165deg, #e7effd 0%, var(--bg) 45%); }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 20px; }
    .hero { background: linear-gradient(135deg, #16408a, #1d75df); color: #fff; border-radius: 18px; padding: 22px; box-shadow: 0 14px 35px rgba(23, 63, 130, 0.28); }
    .hero h1 { margin: 0; font-size: 30px; }
    .hero p { margin: 6px 0 0; color: #d9e8ff; }
    .status { margin-top: 8px; font-size: 13px; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0; }
    .tabs button { border: 0; border-radius: 999px; padding: 9px 14px; font-weight: 700; cursor: pointer; }
    .tabs .tab { background: #e5ebf5; color: #1e2a3c; }
    .tabs .active { background: #172b48; color: #fff; }
    .tabs .refresh { background: var(--brand); color: #fff; }
    .error { background: #fde9e9; color: var(--danger); border: 1px solid #f2b3b3; border-radius: 10px; padding: 10px; margin-bottom: 12px; }
    .ok { background: #e9f8ef; color: var(--ok); border: 1px solid #bce9cd; border-radius: 10px; padding: 10px; margin-bottom: 12px; }
    .grid { display: grid; gap: 14px; }
    .stats { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
    .two { grid-template-columns: 1.2fr 1fr; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px; }
    .card h2 { margin: 0 0 4px; font-size: 18px; }
    .sub { color: var(--muted); margin: 0 0 12px; font-size: 14px; }
    .metric { margin: 0; font-size: 30px; font-weight: 800; }
    .label { color: var(--muted); margin: 0 0 5px; font-size: 13px; font-weight: 600; }
    .list { margin: 0; padding: 0; list-style: none; display: grid; gap: 8px; max-height: 430px; overflow: auto; }
    .list li { background: #f8faff; border: 1px solid #e4eaf5; border-radius: 10px; padding: 10px; display: grid; gap: 2px; }
    .list small { color: var(--muted); }
    form { display: grid; gap: 10px; }
    input, select, textarea { width: 100%; border: 1px solid #c9d4e5; border-radius: 10px; padding: 10px; font: inherit; }
    button.submit { border: 0; border-radius: 10px; background: var(--brand); color: #fff; font-weight: 700; padding: 10px 12px; cursor: pointer; }
    @media (max-width: 900px) { .two { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <h1>Legal Case Management</h1>
      <p>Vanilla JS frontend mapped directly to the active database schema.</p>
      <div class="status" id="apiStatus">API: /api</div>
    </header>

    <div class="tabs" id="tabs"></div>
    <div id="message"></div>
    <main id="content"></main>
  </div>

  <script>
    const state = {
      active: 'overview',
      loading: true,
      saving: false,
      clients: [],
      lawyers: [],
      cases: [],
      hearings: [],
      message: '',
      messageType: 'ok'
    };

    const tabs = [
      ['overview', 'Overview'],
      ['clients', 'Clients'],
      ['lawyers', 'Lawyers'],
      ['cases', 'Cases'],
      ['hearings', 'Hearings']
    ];

    async function api(path, options) {
      const res = await fetch('/api/' + path.replace(/^\//, ''), options);
      if (!res.ok) {
        const detail = await res.text();
        throw new Error(detail || ('HTTP ' + res.status));
      }
      const type = res.headers.get('content-type') || '';
      if (type.includes('application/json')) return res.json();
      return res.text();
    }

    function showMessage(text, type) {
      state.message = text;
      state.messageType = type;
      render();
    }

    async function refreshAll() {
      state.loading = true;
      render();
      try {
        const [clients, lawyers, cases, hearings] = await Promise.all([
          api('clients'), api('lawyers'), api('cases'), api('hearings')
        ]);
        state.clients = Array.isArray(clients) ? clients : [];
        state.lawyers = Array.isArray(lawyers) ? lawyers : [];
        state.cases = Array.isArray(cases) ? cases : [];
        state.hearings = Array.isArray(hearings) ? hearings : [];
        state.loading = false;
        render();
      } catch (err) {
        state.loading = false;
        showMessage('Failed loading data: ' + err.message, 'error');
      }
    }

    function statsHtml() {
      const activeCases = state.cases.filter(c => c.status === 'Active').length;
      return `
        <section class="grid stats">
          <article class="card"><p class="label">Clients</p><p class="metric">${state.clients.length}</p></article>
          <article class="card"><p class="label">Lawyers</p><p class="metric">${state.lawyers.length}</p></article>
          <article class="card"><p class="label">Cases</p><p class="metric">${state.cases.length}</p></article>
          <article class="card"><p class="label">Active Cases</p><p class="metric">${activeCases}</p></article>
          <article class="card"><p class="label">Hearings</p><p class="metric">${state.hearings.length}</p></article>
        </section>
      `;
    }

    function clientsHtml() {
      return `
        <section class="grid two">
          <article class="card">
            <h2>Client Registry</h2>
            <p class="sub">GET /api/clients</p>
            <ul class="list">${state.clients.map(c => `<li><strong>${c.first_name} ${c.last_name}</strong><small>${c.email || 'No email'}</small><small>${c.phone || 'No phone'}</small></li>`).join('')}</ul>
          </article>
          <form class="card" id="clientForm">
            <h2>Add Client</h2>
            <p class="sub">POST /api/clients</p>
            <input name="first_name" required placeholder="First name" />
            <input name="last_name" required placeholder="Last name" />
            <input name="email" type="email" required placeholder="Email" />
            <input name="phone" required placeholder="Phone" />
            <textarea name="address" required placeholder="Address" rows="3"></textarea>
            <button class="submit" type="submit">${state.saving ? 'Saving...' : 'Create Client'}</button>
          </form>
        </section>
      `;
    }

    function lawyersHtml() {
      return `
        <section class="grid two">
          <article class="card">
            <h2>Counsel Directory</h2>
            <p class="sub">GET /api/lawyers</p>
            <ul class="list">${state.lawyers.map(l => `<li><strong>${l.name}</strong><small>${l.specialization || 'General'}</small></li>`).join('')}</ul>
          </article>
          <form class="card" id="lawyerForm">
            <h2>Add Lawyer</h2>
            <p class="sub">POST /api/lawyers</p>
            <input name="name" required placeholder="Lawyer name" />
            <input name="specialization" required placeholder="Specialization" />
            <button class="submit" type="submit">${state.saving ? 'Saving...' : 'Create Lawyer'}</button>
          </form>
        </section>
      `;
    }

    function casesHtml() {
      const clients = state.clients.map(c => `<option value="${c.client_id}">${c.first_name} ${c.last_name}</option>`).join('');
      const lawyers = state.lawyers.map(l => `<option value="${l.lawyer_id}">${l.name}</option>`).join('');
      return `
        <section class="grid two">
          <article class="card">
            <h2>Case Ledger</h2>
            <p class="sub">GET /api/cases</p>
            <ul class="list">${state.cases.map(c => `<li><strong>Case #${c.case_id}</strong><small>Client: ${c.client_name || 'Unknown'}</small><small>Lawyer: ${c.lawyer_name || 'Unassigned'}</small><small>Status: ${c.status || 'Active'}</small></li>`).join('')}</ul>
          </article>
          <form class="card" id="caseForm">
            <h2>Create Case</h2>
            <p class="sub">POST /api/cases</p>
            <input name="case_number" required placeholder="Case number" />
            <input name="case_type" required placeholder="Case type" />
            <select name="client_id" required><option value="">Select client</option>${clients}</select>
            <select name="lawyer_id" required><option value="">Select lawyer</option>${lawyers}</select>
            <input name="filing_date" type="date" required />
            <textarea name="description" required rows="4" placeholder="Description"></textarea>
            <button class="submit" type="submit">${state.saving ? 'Saving...' : 'Create Case'}</button>
          </form>
        </section>
      `;
    }

    function hearingsHtml() {
      const caseOptions = state.cases.map(c => `<option value="${c.case_id}">Case #${c.case_id}</option>`).join('');
      return `
        <section class="grid two">
          <article class="card">
            <h2>Hearing Timeline</h2>
            <p class="sub">GET /api/hearings</p>
            <ul class="list">${state.hearings.map(h => `<li><strong>Case #${h.case_id}</strong><small>${new Date(h.hearing_date).toLocaleString()}</small><small>${h.notes || 'No notes'}</small></li>`).join('')}</ul>
          </article>
          <form class="card" id="hearingForm">
            <h2>Schedule Hearing</h2>
            <p class="sub">POST /api/hearings</p>
            <select name="case_id" required><option value="">Select case</option>${caseOptions}</select>
            <input name="hearing_date" type="datetime-local" required />
            <textarea name="notes" rows="3" placeholder="Notes"></textarea>
            <button class="submit" type="submit">${state.saving ? 'Saving...' : 'Create Hearing'}</button>
          </form>
        </section>
      `;
    }

    function viewHtml() {
      if (state.loading) return '<section class="card">Loading data...</section>';
      if (state.active === 'overview') return statsHtml();
      if (state.active === 'clients') return clientsHtml();
      if (state.active === 'lawyers') return lawyersHtml();
      if (state.active === 'cases') return casesHtml();
      return hearingsHtml();
    }

    function bindForms() {
      const clientForm = document.getElementById('clientForm');
      if (clientForm) {
        clientForm.onsubmit = async (e) => {
          e.preventDefault();
          state.saving = true; render();
          const form = Object.fromEntries(new FormData(clientForm).entries());
          try {
            await api('clients', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(form) });
            showMessage('Client created successfully.', 'ok');
            await refreshAll();
          } catch (err) {
            showMessage('Create client failed: ' + err.message, 'error');
          } finally { state.saving = false; render(); }
        };
      }

      const lawyerForm = document.getElementById('lawyerForm');
      if (lawyerForm) {
        lawyerForm.onsubmit = async (e) => {
          e.preventDefault();
          state.saving = true; render();
          const form = Object.fromEntries(new FormData(lawyerForm).entries());
          try {
            await api('lawyers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(form) });
            showMessage('Lawyer created successfully.', 'ok');
            await refreshAll();
          } catch (err) {
            showMessage('Create lawyer failed: ' + err.message, 'error');
          } finally { state.saving = false; render(); }
        };
      }

      const caseForm = document.getElementById('caseForm');
      if (caseForm) {
        caseForm.onsubmit = async (e) => {
          e.preventDefault();
          state.saving = true; render();
          const form = Object.fromEntries(new FormData(caseForm).entries());
          form.client_id = Number(form.client_id);
          form.lawyer_id = Number(form.lawyer_id);
          try {
            await api('cases', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(form) });
            showMessage('Case created successfully.', 'ok');
            await refreshAll();
          } catch (err) {
            showMessage('Create case failed: ' + err.message, 'error');
          } finally { state.saving = false; render(); }
        };
      }

      const hearingForm = document.getElementById('hearingForm');
      if (hearingForm) {
        hearingForm.onsubmit = async (e) => {
          e.preventDefault();
          state.saving = true; render();
          const form = Object.fromEntries(new FormData(hearingForm).entries());
          form.case_id = Number(form.case_id);
          try {
            await api('hearings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(form) });
            showMessage('Hearing created successfully.', 'ok');
            await refreshAll();
          } catch (err) {
            showMessage('Create hearing failed: ' + err.message, 'error');
          } finally { state.saving = false; render(); }
        };
      }
    }

    function render() {
      const tabsEl = document.getElementById('tabs');
      tabsEl.innerHTML = tabs
        .map(([id, label]) => `<button class="tab ${state.active === id ? 'active' : ''}" data-tab="${id}">${label}</button>`)
        .join('') + '<button class="refresh" id="refreshBtn">Refresh</button>';
      tabsEl.querySelectorAll('[data-tab]').forEach(btn => {
        btn.onclick = () => { state.active = btn.dataset.tab; render(); };
      });
      document.getElementById('refreshBtn').onclick = refreshAll;

      const msg = document.getElementById('message');
      msg.innerHTML = state.message ? `<div class="${state.messageType === 'error' ? 'error' : 'ok'}">${state.message}</div>` : '';
      document.getElementById('content').innerHTML = viewHtml();
      bindForms();
    }

    refreshAll();
    render();
  </script>
</body>
</html>
